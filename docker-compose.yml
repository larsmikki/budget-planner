services:
  budget-planner:
    image: larsmikki/budget-planner:latest
    container_name: budget-planner
    ports:
      - "3000:3000"
    volumes:
      - budget-planner-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 5m
      timeout: 10s
      retries: 3

volumes:
  budget-planner-data: