services:
  budgety:
    image: larsmikki/budgety:latest
    container_name: budgety
    ports:
      - "3000:3000"
    volumes:
      - budgety-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 5m
      timeout: 10s
      retries: 3

volumes:
  budgety-data: